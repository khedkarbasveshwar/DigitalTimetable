<!DOCTYPE html>
<html>
<head>
    <title>Edit Faculty</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: auto;
            background-color: #f7f7f7;
        }
        h2 {
            text-align: center;
            margin-bottom: 20px;
        }
        input, button {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 16px;
            background-color: #fff; /* Input background */
        }
        button {
            background-color: #2196F3;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background-color: #0b7dda;
        }
        a {
            display: block;
            text-align: center;
            margin-top: 15px;
            color: #2196F3;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
        label {
            font-weight: bold;
        }
    </style>
</head>
<body>

<h2>Edit Faculty</h2>

<form method="POST">
    <label>Faculty ID</label>
    <input type="text" name="faculty_id" value="{{ faculty[0] }}" readonly><br>

    <label>Name</label>
    <input type="text" name="name" value="{{ faculty[1] }}" required><br>

    <label>Email</label>
    <input type="email" name="email" value="{{ faculty[2] }}"><br>

    <label>Mobile</label>
    <input type="text" name="mobile" value="{{ faculty[5] }}"><br>

    <label>Subject</label>
    <input type="text" name="subject" value="{{ faculty[3] }}"><br>

    <label>Designation</label>
    <input type="text" name="designation" value="{{ faculty[4] }}"><br>

    <button type="submit">Update Faculty</button>
</form>

<a href="/view_faculty">Back to Faculty List</a>

</body>
</html>
